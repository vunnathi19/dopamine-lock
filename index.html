<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dopamine Lock</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- Intro Screen -->

    <div id="intro">

        <h1 class="logo">
            Dopamine Lock
        </h1>

        <p class="tagline">
            Earn your entertainment through discipline
        </p>

        <div class="loader"></div>

    </div>


    <!-- Main Dashboard -->

    <div class="container hidden">

        <h1>
            Welcome Back
        </h1>

        <p class="subtitle">
            Enter your tasks and stay focused.
        </p>

        <div class="task-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task">
            <button onclick="addTask()">
    Add Task
</button>
        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
